<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMPANA FANANTENANA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="home">
        <header class="logo-container">
            <img src="logo.png" class="logo-home" alt="Logo Sampana">
        </header>

        <section class="search-section">
            <input type="text" id="search" placeholder="🔎 Tadiavo ny hira...">
        </section>

        <main class="container">
            <ul id="songList"></ul>
        </main>
    </div>

    <div id="songPage" style="display:none;">
        <header class="fixed-header">
            <div class="header-controls-row">
                <img src="home.png" class="back-icon" onclick="goBack()" alt="Back">

                <div class="player-container">
                    <input type="range" id="songProgressBar" value="0" step="1">

                    <div class="timer-display">
                        <span id="currentTime">0:00</span>
                        <span id="durationTime">0:00</span>
                    </div>
                    
                    <div class="mini-player">
                        <button class="btn-icon" onclick="togglePlay()">
                            <img id="playPauseIcon" src="play.png" alt="Play">
                        </button>
                        <button class="btn-icon" onclick="stopAudio()">
                            <img src="stop.png" alt="Stop">
                        </button>
                    </div>
                </div>
            </div>

            <div class="title-container">
                <h2 id="songTitle" class="header-title">Hira</h2>
            </div>
        </header>

        <article class="lyrics-container">
            <div id="lyrics"></div>
        </article>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
