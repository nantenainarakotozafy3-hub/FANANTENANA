<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAMPANA FANANTENANA</title>
    <meta name="theme-color" content="#0097c2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    
    <div id="loginPage" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; font-family: sans-serif; background-color: #ffffff;">
    
        <img src="logo.png" style="width: 320px; max-width: 90%; margin-bottom: 40px;">
        <h1 style="color: #0097c2; font-weight: bold; margin-bottom: 25px;">MIARAHABA ANAO</h1>
        <p style="font-size: 18px; margin-bottom: 15px;">Ampiasao ny teny miafina ahafahanao miditra</p>

        <div style="position: relative; width: 80%; max-width: 400px; margin-bottom: 20px;">
            <input type="password" id="memberCode" placeholder="Soraty eto ny teny miafina..." 
                style="padding: 15px 55px 15px 15px; border-radius: 12px; border: 2px solid #0097c2; width: 100%; box-sizing: border-box; text-align: left; font-size: 18px; outline: none;">
            
            <div onclick="toggleVisibility()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; z-index: 10;">
                <img id="eyeIcon" src="show.png" alt="Maso" style="width: 100%; height: auto; opacity: 0.6;">
            </div>
        </div>

        <button onclick="verifyCode()" style="padding: 12px 60px; background: #0097c2; color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer;">
            HIDITRA
        </button>
        <p id="loginError" style="color: red; display: none; margin-top: 15px; font-weight: bold;">❌ Hamarino io teny miafina io!</p>
    </div>

    <div id="home" style="display:none;">
        <header class="logo-container" style="position: relative; width: 100%; display: flex; justify-content: center; align-items: center; padding: 50px 0 30px 0; min-height: 150px;">
            <img src="logo.png" class="logo-home" alt="Logo Sampana" style="max-width: 280px; width: 90%; height: auto;">
            <button onclick="logout()" style="position: absolute; right: 25px; top: 25px; background: transparent; border: none; cursor: pointer; padding: 10px; outline: none; -webkit-tap-highlight-color: transparent; z-index: 1001;">
                <img src="logout.png" alt="Hivoaka" style="width: 65px; height: 65px; object-fit: contain; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.2));">
            </button>
        </header>

        <section class="search-section">
            <input type="text" id="search" placeholder="🔎 Tadiavo ny hira...">
        </section>

        <main class="container">
            <ul id="songList"></ul>
        </main>
    </div>

    <div id="songPage" style="display:none;">
        <header class="fixed-header">
            <div class="header-controls-row">
                <img src="home.png" class="back-icon" onclick="goBack()" alt="Back">

                <div class="player-container">
                    <input type="range" id="songProgressBar" value="0" step="1">
                    <div class="timer-display">
                        <span id="currentTime">0:00</span>
                        <span id="durationTime">0:00</span>
                    </div>
                    <div class="mini-player">
                        <button class="btn-icon" onclick="togglePlay()">
                            <img id="playPauseIcon" src="play.png" alt="Play">
                        </button>
                        <button class="btn-icon" onclick="stopAudio()">
                            <img src="stop.png" alt="Stop">
                        </button>
                    </div>
                </div>
            </div>
            <div class="title-container">
                <h2 id="songTitle" class="header-title">Hira</h2>
            </div>
        </header>

        <article class="lyrics-container">
            <div id="lyrics"></div>
        </article>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="script.js"></script>
</body>
</html>
