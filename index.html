<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMPANA FANANTENANA</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="home">
        <header class="logo-container">
            <img src="logo.png" class="logo-home" alt="Logo Sampana">
        </header>

        <section class="search-section">
            <input type="text" id="search" placeholder="🔎 Tadiavo ny hira...">
        </section>

        <main class="container">
            <ul id="songList"></ul>
        </main>
    </div>

    <div id="songPage" style="display:none;">
        <header class="fixed-header">
            <img src="back-icon.png" onclick="goBack()" class="back-icon" alt="Miverina">
            
            <div class="header-content">
                <img src="logo.png" class="logo-mini" alt="Logo">
                
                <div class="mini-player">
                    <audio id="audioPlayer"></audio>
                    <div class="player-controls">
                        <button onclick="togglePlay()" class="btn-icon">
                            <img id="playPauseIcon" src="play.png" alt="Play">
                        </button>
                        <button onclick="stopAudio()" class="btn-icon">
                            <img src="stop.png" alt="Stop">
                        </button>
                    </div>
                </div>

                <h2 id="songTitle"></h2>
            </div>
        </header>

        <article class="lyrics-container">
            <div id="lyrics"></div>
        </article>
    </div>

    <script src="script.js"></script>
</body>
</html>
