<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAMPANA FANANTENANA</title>
    <meta name="theme-color" content="#0097c2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    
    <div id="loginPage" class="login-container">
        <img src="logo.png" class="login-logo" alt="Logo">
        <h1>TONGASOA</h1>
        <p>Mila teny miafina ahafahanao miditra</p>

        <div class="password-wrapper">
            <input type="password" id="memberCode" placeholder="Soraty eto ny teny miafina...">
            <div onclick="toggleVisibility()" class="eye-btn">
                <img id="eyeIcon" src="show.png" alt="Maso">
            </div>
        </div>

        <button onclick="verifyCode()" class="btn-login">HIDITRA</button>
        <p id="loginError" class="error-msg" style="display: none;">❌ Hamarino io teny miafina io!</p>
    </div>

    <div id="home" style="display:none;">
        <header class="logo-container">
            <img src="logo.png" class="logo-home" alt="Logo Sampana">
            <img src="logout.png" class="logout-home" onclick="logout()" alt="Hivoaka">
        </header>

        <section class="search-section">
            <input type="text" id="search" placeholder="🔎 Tadiavo ny hira...">
        </section>

        <main class="container">
            <ul id="songList"></ul>
        </main>
    </div>

        <div id="songPage" style="display:none;">
        <header class="fixed-header">
            <div class="header-controls-row">
                <div class="controls-group">
                    <img src="home.png" class="back-icon" onclick="goBack()" alt="Back">
                    
                    <button class="btn-icon" onclick="togglePlay()">
                        <img id="playPauseIcon" src="play.png" alt="Play">
                    </button>
                    
                    <button class="btn-icon" onclick="stopAudio()">
                        <img src="stop.png" alt="Stop">
                    </button>
                </div>

                <div class="progress-section">
                    <input type="range" id="songProgressBar" value="0" step="1">
                    <div class="timer-display">
                        <span id="currentTime">0:00</span>
                        <span id="durationTime">0:00</span>
                    </div>
                </div>
            </div>

            <div class="title-container">
                <h2 id="songTitle" class="header-title">Hira</h2>
            </div>
        </header>

        <article class="lyrics-container">
            <div id="lyrics"></div>
        </article>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="script.js"></script>
</body>
</html>
