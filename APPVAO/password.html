<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fanantenana</title>

<style>
body{
text-align:center;
font-family:Arial;
margin-top:100px;
}

.password-box{
position:relative;
display:inline-block;
}

.password-box input{
padding:10px;
font-size:16px;
}

.eye{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
}
</style>

<script>
function checkPassword(){
var password=document.getElementById("pass").value;

if(password==="z@hFanantenana"){
window.location.href="https://nantenainarakotozafy3-hub.github.io/FANANTENANA/";
}else{
alert("Mot de passe diso!");
}
}

function togglePassword(){
var x=document.getElementById("pass");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}
}
</script>

</head>

<body>

<h2>Ampidiro ny mot de passe</h2>

<div class="password-box">
<input type="password" id="pass" placeholder="Mot de passe">
<span class="eye" onclick="togglePassword()">👁️</span>
</div>

<br><br>

<button onclick="checkPassword()">Hiditra</button>

</body>
</html>
